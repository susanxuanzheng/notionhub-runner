# NotionHub generated workflow v23
name: 微信读书

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 触发原因
        required: false
        default: manual
      sync_mode:
        description: 同步模式
        required: false
        default: incremental
        type: choice
        options:
          - incremental
          - full
      syncMode:
        description: 同步模式（兼容旧版本）
        required: false
        default: incremental
        type: choice
        options:
          - incremental
          - full
      repair_after_sync:
        description: 全量更新后自动修复 Notion 数据
        required: false
        default: 'false'
      payload:
        description: 同步参数 JSON
        required: false
        default: '{}'
  schedule:
    - cron: '0 16 * * *'

concurrency:
  group: notionhub-微信读书-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: 同步 微信读书
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      WEREAD_CONFIG: ${{ secrets.WEREAD_CONFIG }}
    steps:
      - name: 验证运行配置
        id: activation
        env:
          SERVICE_CONFIG: ${{ secrets.WEREAD_CONFIG }}
          RUNNER_SSH_KEY: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
        run: |
          if [ -z "$SERVICE_CONFIG" ]; then
            echo "::warning title=微信读书尚未配置::请先在插件中完成配置并保存。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$RUNNER_SSH_KEY" ]; then
            echo "::error title=运行器配置缺失::缺少只读部署密钥，请在插件中重新连接 GitHub。"
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=微信读书::运行配置验证通过。"

      - name: 检查 Notion 授权
        if: steps.activation.outputs.enabled == 'true'
        env:
          SERVICE_CONFIG: ${{ secrets.WEREAD_CONFIG }}
          NOTIONHUB_RUN_TOKEN: ${{ secrets.NOTIONHUB_RUN_TOKEN }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          NOTION_TOKEN=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.WEREAD_NOTION_TOKEN // empty')
          EXPIRES_AT=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.WEREAD_NOTION_DATA // "{}" | fromjson? | .expires_at // empty')
          NEED_REFRESH=false
          NOW=$(date +%s)
          if [ -n "$EXPIRES_AT" ] && [ "$EXPIRES_AT" != "null" ]; then
            EXPIRY=$(date -d "$EXPIRES_AT" +%s 2>/dev/null || printf '%s' "$EXPIRES_AT" | cut -d. -f1)
            if [ -n "$EXPIRY" ] && [ "$EXPIRY" -le "$((NOW + 300))" ] 2>/dev/null; then NEED_REFRESH=true; fi
          fi
          if [ "$NEED_REFRESH" = "false" ] && [ -n "$NOTION_TOKEN" ]; then
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' https://api.notion.com/v1/users/me               -H "Authorization: Bearer $NOTION_TOKEN" -H 'Notion-Version: 2025-09-03')
            if [ "$STATUS" = "401" ]; then NEED_REFRESH=true; fi
          fi
          if [ "$NEED_REFRESH" = "true" ]; then
            if [ -z "$NOTIONHUB_RUN_TOKEN" ]; then
              echo "::error title=Notion 授权已过期::请回到插件重新授权 Notion。"
              exit 1
            fi
            PAYLOAD=$(jq -cn --arg service "weread" --arg repository "$GITHUB_REPOSITORY_NAME" '{service:$service,repository:$repository}')
            TIMESTAMP=$(date +%s)
            NONCE=$(openssl rand -hex 16)
            BODY_SHA256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -r | awk '{print $1}')
            SIGNING_PAYLOAD=$(printf 'POST\n/v1/github/runner/refresh-config\n%s\n%s\n%s' "$TIMESTAMP" "$NONCE" "$BODY_SHA256")
            SIGNATURE=$(printf '%s' "$SIGNING_PAYLOAD" | openssl dgst -sha256 -hmac "$NOTIONHUB_RUN_TOKEN" -r | awk '{print $1}')
            RESPONSE=$(curl -fsSL -X POST "https://i.notionhub.app/v1/github/runner/refresh-config"               -H "Authorization: Bearer $NOTIONHUB_RUN_TOKEN" -H 'Content-Type: application/json'               -H "X-NotionHub-Timestamp: $TIMESTAMP" -H "X-NotionHub-Nonce: $NONCE" -H "X-NotionHub-Signature: $SIGNATURE"               --data "$PAYLOAD")
            REFRESHED_CONFIG=$(printf '%s' "$RESPONSE" | jq -r '.serviceConfig // empty')
            if [ -z "$REFRESHED_CONFIG" ]; then
              MESSAGE=$(printf '%s' "$RESPONSE" | jq -r '.message // "Notion 授权刷新失败"')
              echo "::error title=Notion 授权刷新失败::$MESSAGE"
              exit 1
            fi
            echo "::add-mask::$REFRESHED_CONFIG"
            {
              echo "WEREAD_CONFIG<<NOTIONHUB_EOF"
              echo "$REFRESHED_CONFIG"
              echo "NOTIONHUB_EOF"
            } >> "$GITHUB_ENV"
            echo "::notice title=Notion 授权已更新::本次同步将使用刷新后的授权。"
          fi

      - name: 获取同步程序
        if: steps.activation.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          repository: malinkang/notionhub-private-runner
          ref: runner
          ssh-key: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
          persist-credentials: false
          path: runner

      - name: 配置 Python 环境
        if: steps.activation.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装运行依赖
        if: steps.activation.outputs.enabled == 'true'
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements weread)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 同步 微信读书
        id: sync
        if: steps.activation.outputs.enabled == 'true'
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_SERVICE: weread
          NOTIONHUB_CONFIG_VERSION: '17'
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || github.event.inputs.syncMode || '' }}
          SUPPORTS_FULL_SYNC: 'true'
          INPUT_REPAIR_AFTER_SYNC: ${{ github.event.inputs.repair_after_sync || '' }}
          SYNC_PLAN: lifetime
          ENTITLEMENT_PLAN: lifetime
          NOTIONHUB_DEFER_MEDIA: 'true'
        run: |
          REQUESTED_SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg sync_mode "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.syncMode // $payload.sync_mode // "incremental") as $payload_mode | if $sync_mode == "full" or $sync_mode == "incremental" then $sync_mode else $payload_mode end')
          if [ "$REQUESTED_SYNC_MODE" = "full" ] && [ "$SUPPORTS_FULL_SYNC" != "true" ]; then
            echo "::error title=全量更新不可用::微信读书 暂不支持全量更新，请改用普通同步。"
            exit 1
          fi
          ACTION_PAYLOAD=$(jq -cn --arg raw "$RAW_ACTION_PAYLOAD" --arg sync_mode "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.syncMode // $payload.sync_mode // "incremental") as $payload_mode | (if $sync_mode == "full" or $sync_mode == "incremental" then $sync_mode else $payload_mode end) as $mode | $payload + {syncMode:$mode,sync_mode:$mode}')
          if [ "$INPUT_REPAIR_AFTER_SYNC" = "true" ] || [ "$INPUT_REPAIR_AFTER_SYNC" = "false" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c --arg value "$INPUT_REPAIR_AFTER_SYNC" '. + {repair_after_sync:($value == "true"),runSafeRepairAfterSync:($value == "true")}')
          fi
          export NOTIONHUB_ACTION_PAYLOAD="$ACTION_PAYLOAD"
          cd runner
          python - <<'PY'
          import json, os
          raw = os.environ.get('WEREAD_CONFIG', '{}')
          try: values = json.loads(raw).values()
          except Exception: values = [raw]
          for value in values:
              escaped = str(value).replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              if escaped: print(f'::add-mask::{escaped}')
          PY
          echo "::notice title=微信读书同步开始::正在读取数据并写入 Notion。"
          python -m notionhub_runner sync weread
          echo "::notice title=微信读书同步成功::所有同步步骤均已完成。"

      - name: 查看补充日志
        if: always() && steps.activation.outputs.enabled == 'true'
        run: |
          FOUND_LOG=0
          while IFS= read -r -d '' LOG_FILE; do
            FOUND_LOG=1
            echo "::group::$LOG_FILE"
            cat "$LOG_FILE"
            echo "::endgroup::"
          done < <(find runner/scripts -type f -path '*/log/*.log' -print0)
          if [ "$FOUND_LOG" -eq 0 ]; then echo "脚本已直接输出实时日志，没有额外日志文件。"; fi

      - name: 生成运行摘要
        if: always()
        env:
          SYNC_OUTCOME: ${{ steps.sync.outcome }}
          EVENT_NAME: ${{ github.event_name }}
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || github.event.inputs.syncMode || '' }}
        run: |
          case "$SYNC_OUTCOME" in
            success) RESULT="同步成功" ;;
            failure) RESULT="同步失败" ;;
            cancelled) RESULT="已取消" ;;
            skipped) RESULT="已跳过" ;;
            *) RESULT="未执行" ;;
          esac
          if [ "$EVENT_NAME" = "schedule" ]; then TRIGGER="定时运行"; else TRIGGER="手动运行"; fi
          SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg input "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | if $input == "full" or $input == "incremental" then $input else ($payload.syncMode // $payload.sync_mode // "incremental") end')
          if [ "$SYNC_MODE" = "full" ]; then MODE_LABEL="全量更新"; else MODE_LABEL="增量同步"; fi
          {
            echo "## 微信读书同步"
            echo ""
            echo "| 项目 | 内容 |"
            echo "| --- | --- |"
            echo "| 结果 | $RESULT |"
            echo "| 模式 | $MODE_LABEL |"
            echo "| 触发方式 | $TRIGGER |"
            echo "| 运行记录 | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
