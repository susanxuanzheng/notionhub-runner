# NotionHub generated workflow v32
name: 微信读书

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 触发原因
        required: false
        default: manual
      sync_mode:
        description: 同步模式
        required: false
        default: incremental
        type: choice
        options:
          - incremental
          - full
      repair_after_sync:
        description: 全量更新后自动修复 Notion 数据
        required: false
        default: 'false'
      payload:
        description: 同步参数 JSON
        required: false
        default: '{}'
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: read
  id-token: write

concurrency:
  group: notionhub-weread-sync-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  books:
    name: 同步书籍
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      enabled: ${{ steps.activation.outputs.enabled }}
      continuation_ready: ${{ steps.progress.outputs.ready }}
    env:
      WEREAD_CONFIG: ${{ secrets.WEREAD_CONFIG }}
      NOTIONHUB_API_BASE: https://i.notionhub.app/v1
      NOTIONHUB_SERVICE: weread
      NOTIONHUB_CONFIG_VERSION: '26'
      SYNC_POLICY_STATE_PATH: ${{ github.workspace }}/notionhub-state.json
      SYNC_POLICY_CONTINUATION_PATH: ${{ github.workspace }}/notionhub-continuation-id
      SYNC_POLICY_REPORT_PATH: ${{ github.workspace }}/notionhub-service-report.json
    steps:
      - name: 验证运行配置
        id: activation
        env:
          SERVICE_CONFIG: ${{ secrets.WEREAD_CONFIG }}
        run: |
          if [ -z "$SERVICE_CONFIG" ]; then
            echo "::notice title=微信读书尚未配置::请先在插件中完成配置并保存。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PLAN=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.WEREAD_SYNC_PLAN // "lifetime"')
          REMAINING=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.WEREAD_TRIAL_RUNS_REMAINING // 1')
          if [ "$PLAN" = "trial" ] && { ! [[ "$REMAINING" =~ ^[0-9]+$ ]] || [ "$REMAINING" -le 0 ]; }; then
            echo "::error title=免费同步次数已经用完::免费同步次数已经用完，请付费解锁。"
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "plan=$PLAN" >> "$GITHUB_OUTPUT"

      - name: 获取短期运行授权
        id: authorize
        if: steps.activation.outputs.enabled == 'true'
        run: |
          OIDC_TOKEN=$(curl -fsSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https%3A%2F%2Fi.notionhub.app" | jq -r '.value // empty')
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::error title=GitHub 身份验证失败::未能获取本次运行的 OIDC token。"
            exit 1
          fi
          echo "::add-mask::$OIDC_TOKEN"
          AUTH_RESPONSE="$RUNNER_TEMP/notionhub-authorize.json"
          HTTP_STATUS=$(curl -sS -o "$AUTH_RESPONSE" -w '%{http_code}' -X POST "$NOTIONHUB_API_BASE/github/runner/authorize-run"             -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json'             --data '{"service":"weread","purpose":"sync"}')
          if [ "$HTTP_STATUS" = "418" ]; then
            echo "::error title=免费同步次数已经用完::免费同步次数已经用完，请付费解锁。"
            exit 1
          fi
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            MESSAGE=$(jq -r '.message // "运行授权失败"' "$AUTH_RESPONSE")
            echo "::error title=运行授权失败::$MESSAGE"
            exit 1
          fi
          ACCESS_TOKEN=$(jq -r '.data.accessToken // empty' "$AUTH_RESPONSE")
          BUNDLE_TOKEN=$(jq -r '.data.bundleToken // empty' "$AUTH_RESPONSE")
          REPORT_TOKEN=$(jq -r '.data.reportToken // empty' "$AUTH_RESPONSE")
          BUNDLE_URL=$(jq -r '.data.bundleUrl // empty' "$AUTH_RESPONSE")
          POLICY_ID=$(jq -r '.data.context.id // empty' "$AUTH_RESPONSE")
          PLAN=$(jq -r '.data.context.plan // empty' "$AUTH_RESPONSE")
          POLICY_JSON=$(jq -c '.data.context.policy // {}' "$AUTH_RESPONSE")
          POLICY_SIGNATURE=$(jq -r '.data.policySignature // empty' "$AUTH_RESPONSE")
          for VALUE in "$ACCESS_TOKEN" "$BUNDLE_TOKEN" "$REPORT_TOKEN" "$POLICY_SIGNATURE"; do
            if [ -n "$VALUE" ]; then echo "::add-mask::$VALUE"; fi
          done
          if [ -z "$ACCESS_TOKEN" ] || [ -z "$BUNDLE_TOKEN" ] || [ -z "$REPORT_TOKEN" ] || [ -z "$BUNDLE_URL" ] || [ -z "$POLICY_ID" ] || [ -z "$POLICY_SIGNATURE" ]; then
            echo "::error title=运行授权失败::授权响应缺少短期运行字段。"
            exit 1
          fi
          {
            echo "NOTIONHUB_RUN_ACCESS_TOKEN=$ACCESS_TOKEN"
            echo "NOTIONHUB_BUNDLE_TOKEN=$BUNDLE_TOKEN"
            echo "NOTIONHUB_REPORT_TOKEN=$REPORT_TOKEN"
            echo "NOTIONHUB_BUNDLE_URL=$BUNDLE_URL"
            echo "NOTIONHUB_POLICY_ID=$POLICY_ID"
            echo "SYNC_RUN_ID=$POLICY_ID"
            echo "SYNC_PLAN=$PLAN"
            echo "ENTITLEMENT_PLAN=$PLAN"
            echo "SYNC_POLICY_JSON=$POLICY_JSON"
            echo "SYNC_POLICY_SIGNATURE=$POLICY_SIGNATURE"
            echo "SYNC_POLICY_SIGNING_KEY=$ACCESS_TOKEN"
          } >> "$GITHUB_ENV"

      - name: 刷新服务配置
        id: refresh
        if: steps.authorize.outcome == 'success'
        run: |
          REFRESH_RESPONSE="$RUNNER_TEMP/notionhub-refresh.json"
          HTTP_STATUS=$(curl -sS -o "$REFRESH_RESPONSE" -w '%{http_code}' -X POST "$NOTIONHUB_API_BASE/internal/services/weread/refresh-config"             -H "Authorization: Bearer $NOTIONHUB_RUN_ACCESS_TOKEN" -H 'Content-Type: application/json' --data '{}')
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            MESSAGE=$(jq -r '.message // "服务配置刷新失败"' "$REFRESH_RESPONSE")
            echo "::error title=服务配置刷新失败::$MESSAGE"
            exit 1
          fi
          REFRESHED_CONFIG=$(jq -c '.data.serviceConfig // empty' "$REFRESH_RESPONSE")
          if [ -z "$REFRESHED_CONFIG" ]; then
            echo "::error title=服务配置刷新失败::Worker 未返回服务配置。"
            exit 1
          fi
          echo "::add-mask::$REFRESHED_CONFIG"
          echo 'WEREAD_CONFIG<<NOTIONHUB_CONFIG_EOF' >> "$GITHUB_ENV"
          echo "$REFRESHED_CONFIG" >> "$GITHUB_ENV"
          echo 'NOTIONHUB_CONFIG_EOF' >> "$GITHUB_ENV"

      - name: 获取服务运行程序
        id: bundle
        if: steps.refresh.outcome == 'success'
        run: |
          curl -fsSL "$NOTIONHUB_BUNDLE_URL" -H "Authorization: Bearer $NOTIONHUB_BUNDLE_TOKEN" -o "$RUNNER_TEMP/notionhub-runner.tar.gz"
          if tar -tzf "$RUNNER_TEMP/notionhub-runner.tar.gz" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "::error title=运行程序校验失败::bundle 包含不安全路径。"
            exit 1
          fi
          tar -xzf "$RUNNER_TEMP/notionhub-runner.tar.gz"
          test -f runner/requirements.txt
          test -d runner/notionhub_runner

      - name: 配置 Python 环境
        if: steps.bundle.outcome == 'success'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装运行依赖
        id: install
        if: steps.bundle.outcome == 'success'
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements weread)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 同步书籍
        id: sync
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || '' }}
          SUPPORTS_FULL_SYNC: 'true'
          INPUT_REPAIR_AFTER_SYNC: ${{ github.event.inputs.repair_after_sync || '' }}
          NOTIONHUB_DEFER_FILES: 'true'
        run: |
          REQUESTED_SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg input "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.requestedSyncMode // $payload.syncMode // $payload.sync_mode // "") as $payload_mode | (if $payload_mode == "full" or $payload_mode == "incremental" then $payload_mode elif $input == "full" or $input == "incremental" then $input else "incremental" end)')
          CONFIG_INITIAL_FULL_SYNC_REQUIRED=$(printf '%s' "$WEREAD_CONFIG" | jq -r '(.WEREAD_INITIAL_FULL_SYNC_REQUIRED // false) | tostring' 2>/dev/null || echo "false")
          PAYLOAD_INITIAL_FULL_SYNC_REQUIRED=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" '($raw | fromjson? // {}) | (.initialFullSyncForced // false) | tostring')
          if [ "$CONFIG_INITIAL_FULL_SYNC_REQUIRED" = "true" ] || [ "$PAYLOAD_INITIAL_FULL_SYNC_REQUIRED" = "true" ]; then
            EFFECTIVE_SYNC_MODE=full
            INITIAL_FULL_SYNC_FORCED=true
          else
            EFFECTIVE_SYNC_MODE="$REQUESTED_SYNC_MODE"
            INITIAL_FULL_SYNC_FORCED=false
          fi
          ACTION_PAYLOAD=$(jq -cn --arg raw "$RAW_ACTION_PAYLOAD" --arg requested "$REQUESTED_SYNC_MODE" --arg effective "$EFFECTIVE_SYNC_MODE" --arg forced "$INITIAL_FULL_SYNC_FORCED" '($raw | fromjson? // {}) + {requestedSyncMode:$requested,syncMode:$effective,sync_mode:$effective,effectiveSyncMode:$effective,initialFullSyncForced:($forced == "true")}')
          if [ "$INITIAL_FULL_SYNC_FORCED" = "true" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c '. + {repair:true,repair_after_sync:true,runSafeRepairAfterSync:true}')
          elif [ "$INPUT_REPAIR_AFTER_SYNC" = "true" ] || [ "$INPUT_REPAIR_AFTER_SYNC" = "false" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c --arg value "$INPUT_REPAIR_AFTER_SYNC" '. + {repair_after_sync:($value == "true"),runSafeRepairAfterSync:($value == "true")}')
          fi
          {
            echo "NOTIONHUB_ACTION_PAYLOAD=$ACTION_PAYLOAD"
            echo "NOTIONHUB_REQUESTED_SYNC_MODE=$REQUESTED_SYNC_MODE"
            echo "NOTIONHUB_EFFECTIVE_SYNC_MODE=$EFFECTIVE_SYNC_MODE"
            echo "NOTIONHUB_INITIAL_FULL_SYNC_FORCED=$INITIAL_FULL_SYNC_FORCED"
          } >> "$GITHUB_ENV"
          export NOTIONHUB_ACTION_PAYLOAD="$ACTION_PAYLOAD"
          if [ "$SYNC_PLAN" = "trial" ] && [ "$EFFECTIVE_SYNC_MODE" = "full" ]; then
            echo "::error title=免费体验不支持全量更新::请激活后再执行全量更新。"
            exit 1
          fi
          if [ "$EFFECTIVE_SYNC_MODE" = "full" ] && [ "$SUPPORTS_FULL_SYNC" != "true" ]; then
            echo "::error title=全量更新不可用::微信读书 暂不支持全量更新，请改用普通同步。"
            exit 1
          fi
          cd runner
          python - <<'PY'
          import json, os
          raw = os.environ.get('WEREAD_CONFIG', '{}')
          try: values = json.loads(raw).values()
          except Exception: values = [raw]
          for value in values:
              escaped = str(value).replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              if escaped: print(f'::add-mask::{escaped}')
          PY
          python -m notionhub_runner sync weread --stream books

      - name: 准备同步进度
        id: progress
        if: always() && steps.authorize.outcome == 'success'
        run: |
          if [ ! -f "$SYNC_POLICY_STATE_PATH" ]; then printf '{}' > "$SYNC_POLICY_STATE_PATH"; fi
          printf '%s' "$NOTIONHUB_POLICY_ID" > "$SYNC_POLICY_CONTINUATION_PATH"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: 保存同步进度
        if: always() && steps.authorize.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: notionhub-weread-state-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.SYNC_POLICY_STATE_PATH }}
            ${{ env.SYNC_POLICY_CONTINUATION_PATH }}
          if-no-files-found: error
          retention-days: 1

      - name: 确认书籍同步成功
        if: always() && steps.activation.outputs.enabled == 'true' && steps.authorize.outcome == 'success'
        run: |
          if [ "${{ steps.sync.outcome }}" != "success" ]; then exit 1; fi

  reading_time:
    name: 同步阅读时长
    needs: books
    if: always() && needs.books.outputs.enabled == 'true' && needs.books.outputs.continuation_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      WEREAD_CONFIG: ${{ secrets.WEREAD_CONFIG }}
      NOTIONHUB_API_BASE: https://i.notionhub.app/v1
      NOTIONHUB_SERVICE: weread
      NOTIONHUB_CONFIG_VERSION: '26'
      SYNC_POLICY_STATE_PATH: ${{ github.workspace }}/notionhub-state.json
      SYNC_POLICY_CONTINUATION_PATH: ${{ github.workspace }}/notionhub-continuation-id
      SYNC_POLICY_REPORT_PATH: ${{ github.workspace }}/notionhub-service-report.json
    steps:
      - name: 恢复书籍同步进度
        id: restore
        uses: actions/download-artifact@v4
        with:
          name: notionhub-weread-state-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ github.workspace }}

      - name: 续接短期运行授权
        id: authorize
        run: |
          OIDC_TOKEN=$(curl -fsSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https%3A%2F%2Fi.notionhub.app" | jq -r '.value // empty')
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::error title=GitHub 身份验证失败::未能获取本次运行的 OIDC token。"
            exit 1
          fi
          echo "::add-mask::$OIDC_TOKEN"
          CONTINUATION_ID=$(cat "$SYNC_POLICY_CONTINUATION_PATH")
          if [ -z "$CONTINUATION_ID" ]; then
            echo "::error title=运行授权续接失败::同步进度中缺少续接标识。"
            exit 1
          fi
          AUTH_PAYLOAD=$(jq -cn --arg service "weread" --arg policy_id "$CONTINUATION_ID" '{service:$service,purpose:"sync",policyId:$policy_id}')
          AUTH_RESPONSE="$RUNNER_TEMP/notionhub-authorize.json"
          HTTP_STATUS=$(curl -sS -o "$AUTH_RESPONSE" -w '%{http_code}' -X POST "$NOTIONHUB_API_BASE/github/runner/authorize-run"             -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data "$AUTH_PAYLOAD")
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            MESSAGE=$(jq -r '.message // "运行授权续接失败"' "$AUTH_RESPONSE")
            echo "::error title=运行授权续接失败::$MESSAGE"
            exit 1
          fi
          ACCESS_TOKEN=$(jq -r '.data.accessToken // empty' "$AUTH_RESPONSE")
          BUNDLE_TOKEN=$(jq -r '.data.bundleToken // empty' "$AUTH_RESPONSE")
          REPORT_TOKEN=$(jq -r '.data.reportToken // empty' "$AUTH_RESPONSE")
          BUNDLE_URL=$(jq -r '.data.bundleUrl // empty' "$AUTH_RESPONSE")
          POLICY_ID=$(jq -r '.data.context.id // empty' "$AUTH_RESPONSE")
          PLAN=$(jq -r '.data.context.plan // empty' "$AUTH_RESPONSE")
          POLICY_JSON=$(jq -c '.data.context.policy // {}' "$AUTH_RESPONSE")
          POLICY_SIGNATURE=$(jq -r '.data.policySignature // empty' "$AUTH_RESPONSE")
          for VALUE in "$ACCESS_TOKEN" "$BUNDLE_TOKEN" "$REPORT_TOKEN" "$POLICY_ID" "$POLICY_SIGNATURE"; do
            if [ -n "$VALUE" ]; then echo "::add-mask::$VALUE"; fi
          done
          if [ -z "$ACCESS_TOKEN" ] || [ -z "$BUNDLE_TOKEN" ] || [ -z "$REPORT_TOKEN" ] || [ -z "$BUNDLE_URL" ] || [ -z "$POLICY_ID" ] || [ -z "$POLICY_SIGNATURE" ]; then
            echo "::error title=运行授权续接失败::授权响应缺少短期运行字段。"
            exit 1
          fi
          {
            echo "NOTIONHUB_RUN_ACCESS_TOKEN=$ACCESS_TOKEN"
            echo "NOTIONHUB_BUNDLE_TOKEN=$BUNDLE_TOKEN"
            echo "NOTIONHUB_REPORT_TOKEN=$REPORT_TOKEN"
            echo "NOTIONHUB_BUNDLE_URL=$BUNDLE_URL"
            echo "NOTIONHUB_POLICY_ID=$POLICY_ID"
            echo "SYNC_RUN_ID=$POLICY_ID"
            echo "SYNC_PLAN=$PLAN"
            echo "ENTITLEMENT_PLAN=$PLAN"
            echo "SYNC_POLICY_JSON=$POLICY_JSON"
            echo "SYNC_POLICY_SIGNATURE=$POLICY_SIGNATURE"
            echo "SYNC_POLICY_SIGNING_KEY=$ACCESS_TOKEN"
          } >> "$GITHUB_ENV"

      - name: 刷新服务配置
        id: refresh
        if: steps.authorize.outcome == 'success'
        run: |
          REFRESH_RESPONSE="$RUNNER_TEMP/notionhub-refresh.json"
          HTTP_STATUS=$(curl -sS -o "$REFRESH_RESPONSE" -w '%{http_code}' -X POST "$NOTIONHUB_API_BASE/internal/services/weread/refresh-config"             -H "Authorization: Bearer $NOTIONHUB_RUN_ACCESS_TOKEN" -H 'Content-Type: application/json' --data '{}')
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            MESSAGE=$(jq -r '.message // "服务配置刷新失败"' "$REFRESH_RESPONSE")
            echo "::error title=服务配置刷新失败::$MESSAGE"
            exit 1
          fi
          REFRESHED_CONFIG=$(jq -c '.data.serviceConfig // empty' "$REFRESH_RESPONSE")
          if [ -z "$REFRESHED_CONFIG" ]; then
            echo "::error title=服务配置刷新失败::Worker 未返回服务配置。"
            exit 1
          fi
          echo "::add-mask::$REFRESHED_CONFIG"
          echo 'WEREAD_CONFIG<<NOTIONHUB_CONFIG_EOF' >> "$GITHUB_ENV"
          echo "$REFRESHED_CONFIG" >> "$GITHUB_ENV"
          echo 'NOTIONHUB_CONFIG_EOF' >> "$GITHUB_ENV"

      - name: 获取服务运行程序
        id: bundle
        if: steps.refresh.outcome == 'success'
        run: |
          curl -fsSL "$NOTIONHUB_BUNDLE_URL" -H "Authorization: Bearer $NOTIONHUB_BUNDLE_TOKEN" -o "$RUNNER_TEMP/notionhub-runner.tar.gz"
          if tar -tzf "$RUNNER_TEMP/notionhub-runner.tar.gz" | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "::error title=运行程序校验失败::bundle 包含不安全路径。"
            exit 1
          fi
          tar -xzf "$RUNNER_TEMP/notionhub-runner.tar.gz"
          test -f runner/requirements.txt
          test -d runner/notionhub_runner

      - name: 配置 Python 环境
        if: steps.bundle.outcome == 'success'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装运行依赖
        id: install
        if: steps.bundle.outcome == 'success'
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements weread)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 同步阅读时长
        id: sync
        if: needs.books.result == 'success' && steps.install.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || '' }}
          SUPPORTS_FULL_SYNC: 'true'
          INPUT_REPAIR_AFTER_SYNC: ${{ github.event.inputs.repair_after_sync || '' }}
          NOTIONHUB_DEFER_FILES: 'true'
        run: |
          REQUESTED_SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg input "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.requestedSyncMode // $payload.syncMode // $payload.sync_mode // "") as $payload_mode | (if $payload_mode == "full" or $payload_mode == "incremental" then $payload_mode elif $input == "full" or $input == "incremental" then $input else "incremental" end)')
          CONFIG_INITIAL_FULL_SYNC_REQUIRED=$(printf '%s' "$WEREAD_CONFIG" | jq -r '(.WEREAD_INITIAL_FULL_SYNC_REQUIRED // false) | tostring' 2>/dev/null || echo "false")
          PAYLOAD_INITIAL_FULL_SYNC_REQUIRED=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" '($raw | fromjson? // {}) | (.initialFullSyncForced // false) | tostring')
          if [ "$CONFIG_INITIAL_FULL_SYNC_REQUIRED" = "true" ] || [ "$PAYLOAD_INITIAL_FULL_SYNC_REQUIRED" = "true" ]; then
            EFFECTIVE_SYNC_MODE=full
            INITIAL_FULL_SYNC_FORCED=true
          else
            EFFECTIVE_SYNC_MODE="$REQUESTED_SYNC_MODE"
            INITIAL_FULL_SYNC_FORCED=false
          fi
          ACTION_PAYLOAD=$(jq -cn --arg raw "$RAW_ACTION_PAYLOAD" --arg requested "$REQUESTED_SYNC_MODE" --arg effective "$EFFECTIVE_SYNC_MODE" --arg forced "$INITIAL_FULL_SYNC_FORCED" '($raw | fromjson? // {}) + {requestedSyncMode:$requested,syncMode:$effective,sync_mode:$effective,effectiveSyncMode:$effective,initialFullSyncForced:($forced == "true")}')
          if [ "$INITIAL_FULL_SYNC_FORCED" = "true" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c '. + {repair:true,repair_after_sync:true,runSafeRepairAfterSync:true}')
          elif [ "$INPUT_REPAIR_AFTER_SYNC" = "true" ] || [ "$INPUT_REPAIR_AFTER_SYNC" = "false" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c --arg value "$INPUT_REPAIR_AFTER_SYNC" '. + {repair_after_sync:($value == "true"),runSafeRepairAfterSync:($value == "true")}')
          fi
          {
            echo "NOTIONHUB_ACTION_PAYLOAD=$ACTION_PAYLOAD"
            echo "NOTIONHUB_REQUESTED_SYNC_MODE=$REQUESTED_SYNC_MODE"
            echo "NOTIONHUB_EFFECTIVE_SYNC_MODE=$EFFECTIVE_SYNC_MODE"
            echo "NOTIONHUB_INITIAL_FULL_SYNC_FORCED=$INITIAL_FULL_SYNC_FORCED"
          } >> "$GITHUB_ENV"
          export NOTIONHUB_ACTION_PAYLOAD="$ACTION_PAYLOAD"
          if [ "$SYNC_PLAN" = "trial" ] && [ "$EFFECTIVE_SYNC_MODE" = "full" ]; then
            echo "::error title=免费体验不支持全量更新::请激活后再执行全量更新。"
            exit 1
          fi
          if [ "$EFFECTIVE_SYNC_MODE" = "full" ] && [ "$SUPPORTS_FULL_SYNC" != "true" ]; then
            echo "::error title=全量更新不可用::微信读书 暂不支持全量更新，请改用普通同步。"
            exit 1
          fi
          cd runner
          python - <<'PY'
          import json, os
          raw = os.environ.get('WEREAD_CONFIG', '{}')
          try: values = json.loads(raw).values()
          except Exception: values = [raw]
          for value in values:
              escaped = str(value).replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              if escaped: print(f'::add-mask::{escaped}')
          PY
          python -m notionhub_runner sync weread --stream reading_time

      - name: 执行同步后修复
        id: finalize
        if: steps.sync.outcome == 'success'
        run: |
          cd runner
          python -m notionhub_runner sync weread --finalize

      - name: 确认首次全量同步完成
        if: needs.books.result == 'success' && steps.sync.outcome == 'success' && steps.finalize.outcome == 'success'
        run: |
          if [ "$NOTIONHUB_INITIAL_FULL_SYNC_FORCED" != "true" ]; then exit 0; fi
          PAYLOAD=$(jq -cn --arg service "weread" --arg repository "${{ github.repository }}" --arg run_id "${{ github.run_id }}" --arg requested "$NOTIONHUB_REQUESTED_SYNC_MODE" --arg effective "$NOTIONHUB_EFFECTIVE_SYNC_MODE" '{service:$service,repository:$repository,githubRunId:$run_id,status:"success",requestedMode:$requested,effectiveMode:$effective,initialFullSyncForced:true}')
          curl -fsSL -X POST "$NOTIONHUB_API_BASE/internal/initial-full-sync/complete"             -H "Authorization: Bearer $NOTIONHUB_RUN_ACCESS_TOKEN" -H 'Content-Type: application/json' --data "$PAYLOAD" >/dev/null

      - name: 上报运行结果
        id: settle
        if: always() && steps.authorize.outcome == 'success'
        run: |
          if [ "${{ needs.books.result }}" = "success" ] && [ "${{ steps.sync.outcome }}" = "success" ] && [ "${{ steps.finalize.outcome }}" = "success" ]; then STATUS=success; else STATUS=failure; fi
          SETTLEMENT_REPORT="$RUNNER_TEMP/notionhub-settlement.json"
          if [ -d runner/notionhub_runner ]; then
            (cd runner && python -m notionhub_runner report weread --status "$STATUS" --output "$SETTLEMENT_REPORT" --failure-class "${NOTIONHUB_FAILURE_CLASS:-platform}")
          else
            jq -cn --arg service "weread" --arg status "$STATUS" '{service:$service,status:$status,primaryItemsCreated:0,primaryItemsUpdated:0,effectiveWrites:0,failureClass:"platform"}' > "$SETTLEMENT_REPORT"
          fi
          curl -fsSL -X POST "$NOTIONHUB_API_BASE/internal/trial-runs/$NOTIONHUB_POLICY_ID/report"             -H "Authorization: Bearer $NOTIONHUB_REPORT_TOKEN" -H 'Content-Type: application/json' --data-binary "@$SETTLEMENT_REPORT" >/dev/null

      - name: 生成运行摘要
        if: always()
        run: |
          if [ "${{ needs.books.result }}" = "success" ] && [ "${{ steps.sync.outcome }}" = "success" ] && [ "${{ steps.finalize.outcome }}" = "success" ]; then RESULT="同步成功"; else RESULT="同步失败"; fi
          if [ "${{ github.event_name }}" = "schedule" ]; then TRIGGER="定时运行"; else TRIGGER="手动运行"; fi
          if [ "$NOTIONHUB_EFFECTIVE_SYNC_MODE" = "full" ]; then MODE_LABEL="全量更新"; else MODE_LABEL="增量同步"; fi
          {
            echo "## 微信读书同步"
            echo ""
            echo "| 项目 | 内容 |"
            echo "| --- | --- |"
            echo "| 结果 | $RESULT |"
            echo "| 模式 | $MODE_LABEL |"
            echo "| 触发方式 | $TRIGGER |"
            echo "| 运行记录 | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 确认同步成功
        if: always() && steps.authorize.outcome == 'success'
        run: |
          if [ "${{ needs.books.result }}" != "success" ] || [ "${{ steps.sync.outcome }}" != "success" ] || [ "${{ steps.finalize.outcome }}" != "success" ]; then exit 1; fi
