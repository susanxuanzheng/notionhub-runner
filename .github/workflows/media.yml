# NotionHub generated media workflow v24
name: 处理媒体资源

on:
  workflow_run:
    workflows:
      - 小宇宙
      - 豆瓣
      - 哔哩哔哩
      - 网易云音乐
      - Keep
      - Strava
      - Forest
      - Apple Music
      - Spotify
      - 小红书
      - YouTube
    types: [completed]

concurrency:
  group: notionhub-${{ github.event.workflow_run.name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  media:
    name: 补齐图片和文件
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: 识别同步服务
        id: service
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUNNER_SSH_KEY: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
          PODCAST_CONFIG: ${{ secrets.PODCAST_CONFIG }}
          DOUBAN_CONFIG: ${{ secrets.DOUBAN_CONFIG }}
          BILIBILI_CONFIG: ${{ secrets.BILIBILI_CONFIG }}
          NETEASEMUSIC_CONFIG: ${{ secrets.NETEASEMUSIC_CONFIG }}
          KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
          STRAVA_CONFIG: ${{ secrets.STRAVA_CONFIG }}
          FOREST_CONFIG: ${{ secrets.FOREST_CONFIG }}
          APPLEMUSIC_CONFIG: ${{ secrets.APPLEMUSIC_CONFIG }}
          SPOTIFY_CONFIG: ${{ secrets.SPOTIFY_CONFIG }}
          XIAOHONGSHU_CONFIG: ${{ secrets.XIAOHONGSHU_CONFIG }}
          YOUTUBE_CONFIG: ${{ secrets.YOUTUBE_CONFIG }}
        run: |
          case "$WORKFLOW_NAME" in
            '小宇宙') SERVICE='podcast' ;;
            '豆瓣') SERVICE='douban' ;;
            '哔哩哔哩') SERVICE='bilibili' ;;
            '网易云音乐') SERVICE='neteasemusic' ;;
            'Keep') SERVICE='keep' ;;
            'Strava') SERVICE='strava' ;;
            'Forest') SERVICE='forest' ;;
            'Apple Music') SERVICE='applemusic' ;;
            'Spotify') SERVICE='spotify' ;;
            '小红书') SERVICE='xiaohongshu' ;;
            'YouTube') SERVICE='youtube' ;;
            *) echo "::notice title=无需处理媒体::$WORKFLOW_NAME 没有独立媒体任务。"; echo "enabled=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          PREFIX=$(printf '%s' "$SERVICE" | tr '[:lower:]-' '[:upper:]_')
          CONFIG_NAME="${PREFIX}_CONFIG"
          SERVICE_CONFIG="${!CONFIG_NAME}"
          if [ -z "$SERVICE_CONFIG" ]; then
            echo "::notice title=媒体任务已跳过::当前服务尚未保存运行配置。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$RUNNER_SSH_KEY" ]; then
            echo "::error title=运行器配置缺失::缺少只读部署密钥，请在插件中重新连接 GitHub。"
            exit 1
          fi
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: 获取媒体处理程序
        if: steps.service.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          repository: malinkang/notionhub-private-runner
          ref: runner
          ssh-key: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
          persist-credentials: false
          path: runner

      - name: 配置 Python 环境
        if: steps.service.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装媒体处理依赖
        if: steps.service.outputs.enabled == 'true'
        env:
          SERVICE: ${{ steps.service.outputs.service }}
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements "$SERVICE")
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 扫描媒体任务
        id: discover
        if: steps.service.outputs.enabled == 'true'
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_CONFIG_VERSION: '17'
          NOTIONHUB_MEDIA_MANIFEST: ${{ runner.temp }}/notionhub-media.json
          SERVICE: ${{ steps.service.outputs.service }}
          PODCAST_CONFIG: ${{ secrets.PODCAST_CONFIG }}
          DOUBAN_CONFIG: ${{ secrets.DOUBAN_CONFIG }}
          BILIBILI_CONFIG: ${{ secrets.BILIBILI_CONFIG }}
          NETEASEMUSIC_CONFIG: ${{ secrets.NETEASEMUSIC_CONFIG }}
          KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
          STRAVA_CONFIG: ${{ secrets.STRAVA_CONFIG }}
          FOREST_CONFIG: ${{ secrets.FOREST_CONFIG }}
          APPLEMUSIC_CONFIG: ${{ secrets.APPLEMUSIC_CONFIG }}
          SPOTIFY_CONFIG: ${{ secrets.SPOTIFY_CONFIG }}
          XIAOHONGSHU_CONFIG: ${{ secrets.XIAOHONGSHU_CONFIG }}
          YOUTUBE_CONFIG: ${{ secrets.YOUTUBE_CONFIG }}
        run: |
          cd runner
          echo "::group::扫描媒体任务"
          python -m notionhub_runner media discover "$SERVICE"
          echo "::endgroup::"

      - name: 上传图片
        id: images
        if: steps.discover.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_MEDIA_MANIFEST: ${{ runner.temp }}/notionhub-media.json
          SERVICE: ${{ steps.service.outputs.service }}
          PODCAST_CONFIG: ${{ secrets.PODCAST_CONFIG }}
          DOUBAN_CONFIG: ${{ secrets.DOUBAN_CONFIG }}
          BILIBILI_CONFIG: ${{ secrets.BILIBILI_CONFIG }}
          NETEASEMUSIC_CONFIG: ${{ secrets.NETEASEMUSIC_CONFIG }}
          KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
          STRAVA_CONFIG: ${{ secrets.STRAVA_CONFIG }}
          FOREST_CONFIG: ${{ secrets.FOREST_CONFIG }}
          APPLEMUSIC_CONFIG: ${{ secrets.APPLEMUSIC_CONFIG }}
          SPOTIFY_CONFIG: ${{ secrets.SPOTIFY_CONFIG }}
          XIAOHONGSHU_CONFIG: ${{ secrets.XIAOHONGSHU_CONFIG }}
          YOUTUBE_CONFIG: ${{ secrets.YOUTUBE_CONFIG }}
        run: |
          cd runner
          echo "::group::上传图片"
          python -m notionhub_runner media images "$SERVICE"
          echo "::endgroup::"

      - name: 上传大文件
        id: files
        if: always() && steps.discover.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_MEDIA_MANIFEST: ${{ runner.temp }}/notionhub-media.json
          SERVICE: ${{ steps.service.outputs.service }}
          PODCAST_CONFIG: ${{ secrets.PODCAST_CONFIG }}
          DOUBAN_CONFIG: ${{ secrets.DOUBAN_CONFIG }}
          BILIBILI_CONFIG: ${{ secrets.BILIBILI_CONFIG }}
          NETEASEMUSIC_CONFIG: ${{ secrets.NETEASEMUSIC_CONFIG }}
          KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
          STRAVA_CONFIG: ${{ secrets.STRAVA_CONFIG }}
          FOREST_CONFIG: ${{ secrets.FOREST_CONFIG }}
          APPLEMUSIC_CONFIG: ${{ secrets.APPLEMUSIC_CONFIG }}
          SPOTIFY_CONFIG: ${{ secrets.SPOTIFY_CONFIG }}
          XIAOHONGSHU_CONFIG: ${{ secrets.XIAOHONGSHU_CONFIG }}
          YOUTUBE_CONFIG: ${{ secrets.YOUTUBE_CONFIG }}
        run: |
          cd runner
          echo "::group::上传大文件"
          python -m notionhub_runner media files "$SERVICE"
          echo "::endgroup::"

      - name: 汇总资源处理结果
        if: always() && steps.service.outputs.enabled == 'true'
        env:
          IMAGE_OUTCOME: ${{ steps.images.outcome }}
          FILE_OUTCOME: ${{ steps.files.outcome }}
        run: |
          if [ "$IMAGE_OUTCOME" = "failure" ] || [ "$FILE_OUTCOME" = "failure" ]; then
            echo "::warning title=部分资源处理失败::数据同步已经完成，失败的图片或文件会在下次同步后自动重试。"
            exit 1
          fi
          echo "::notice title=资源处理完成::图片和已开启的大文件均已处理。"
